<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LPHugo</title>
  <link rel="stylesheet" href="CSS/LandingPageHugo.css">
</head>

<body>
  <section class="page-wrapper">
    <div class="hero-container">
      <img src="img/banner.jpg" alt="banner" class="hero-image">
      <div class="info-box">
        <h1>Inscreva-se agora </h1>
        <h2>e ganhe uma visita totalmente GRÁTIS.</h2>
        <p>Usufrua uma visita guiada podendo interagir com todos os animais no nosso Santuário.</p>
        <button class="submit-btn" type="button" onclick="scrollToSection()" >Inscreva-se!</button>
      </div>
    </div>
    <div class="form-outer-wrapper">
      <div class="form-box">
      </div>
    </div>
  </section>
  <section class="form-section">
    <div class="form-wrapper" id="target-destination">
      <h3 class="form-title">Inscreva-se!</h3>
      <form class="contact-form">
        <div class="input-row">
          <input type="text" placeholder="Nome" class="half-width">
          <input type="tel" placeholder="Telefone" class="half-width">
        </div>
        <input type="email" placeholder="Email" class="full-width">
        <textarea placeholder="Deixe um comentário sobre o que gostaria de ver no nosso Sanctuário" rows="6" class="full-width"></textarea>
        <button type="submit" class="submit-btn">Enviar</button>
      </form>
    </div>
    </div>
  </section>
  <section>
    <div class="slide-container">
        <div class="mySlides fade">
            <div class="num-text">1 / 3</div>
            <img src="img/relato1.png">
        </div>
        <div class="mySlides fade">
            <div class="num-text">2 / 3</div>
            <img src="img/relato2.png">
        </div>

        <div class="mySlides fade">
            <div class="num-text">3 / 3</div>
            <img src="img/relato3.png">
        </div>
        <a class="prev" >&#10094;</a>
        <a class="next" >&#10095;</a>
    </div>
  </section>
  <script src="js/functions.js"></script>
</body>

</html>
